[colors]
background = #1e242d40
background-alt = #5f819d
foreground = #C5C8C6
primary = #81a2be
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 48pt
radius = 0

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 8pt

border-size = 0pt
border-color = #00000000

padding-left = 1
padding-right = 1

module-margin = 1

separator = Óė°
separator-foreground = ${colors.primary}

font-0 = "JetBrainsMono NF:size=24;2"
font-1 = "JetBrainsMono NFM:size=24;2"

modules-left = text-os xworkspaces
modules-center = xwindow
;modules-right = memory cpu filesystem xkeyboard pulseaudio wlan bat0 bat1 date
modules-right = pulseaudio wlan bat0 bat1 date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true
; tray-position = right

; wm-restack = generic
wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/text-os]
type = custom/text
content = "ÔĆÜ"
content-foreground = ${colors.primary}
content-background = ${colors.background}
content-padding = 1

[module/xworkspaces]
type = internal/xworkspaces

label-active = ÔÜí
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 2
label-active-font = 2

label-occupied = ÔĎĄ
label-occupied-padding = 2
label-occupied-font = 2

label-urgent = ÔĎĄ
label-urgent-background = ${colors.alert}
label-urgent-padding = 2
label-urgent-font = 2

label-empty = ÔďÉ
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2
label-empty-font = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#5f819d}Ôā†%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

;format-volume-prefix = "VOL "
;format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume>

label-volume = %percentage%%

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

label-muted = Ó¨§
label-muted-foreground = ${colors.disabled}

click-right = pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ůįćõ "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ÓČ¶ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#707880}ůįĪü%{F-}

ramp-signal-0 = ůį§≠
ramp-signal-1 = ůį§Į
ramp-signal-2 = ůį§ü
ramp-signal-3 = ůį§Ę
ramp-signal-4 = ůį§•
ramp-signal-5 = ůį§®

[module/wlan]
inherit = network-base
interface-type = wireless

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
label-disconnected = ůį§≠

[battery-base]
type = internal/battery
full-at = 95
low-at = 10
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-discharging>
format-low = <ramp-capacity> <label-discharging>

label-discharging = %percentage%%
label-charging = %percentage%%

ramp-capacity-0 = %{F#A54242}ůįĀĽ%{F-}
ramp-capacity-1 = ůįĀĹ
ramp-capacity-2 = ůįĀŅ
ramp-capacity-3 = ůįāĀ
ramp-capacity-4 = ůįĀĻ

animation-charging-0 = ůįĀĽ
animation-charging-1 = ůįĀĹ
animation-charging-2 = ůįĀŅ
animation-charging-3 = ůįāĀ
animation-charging-4 = ůįĀĻ
animation-charging-framerate = 500

[module/bat0]
inherit = battery-base
battery = BAT0
adapter = ADP1

[module/bat1]
inherit = battery-base
battery = BAT1
adapter = ADP2

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = false

; vim:ft=dosini
